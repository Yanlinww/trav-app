services:
    frontend:
        image: node:20-alpine
        container_name: trav-app-frontend
        working_dir: /app
        ports:
            - "3001:3000"
        volumes:
            - .:/app
            - frontend_node_modules:/app/node_modules
            - frontend_next_cache:/app/.next
        environment:
            - NODE_ENV=development
            - WATCHPACK_POLLING=true
            - CHOKIDAR_USEPOLLING=true
        command: sh -c "npm install && npm run dev:docker"
        restart: always

    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: trav-app-backend
        ports:
            - "8080:80"
        volumes:
            - ./backend/trav-api:/var/www/html
        restart: always

volumes:
    frontend_node_modules:
    frontend_next_cache:
